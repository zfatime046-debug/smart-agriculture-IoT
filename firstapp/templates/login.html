<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connexion – Smart Agriculture IoT</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .login-box {
        background: white;
        padding: 30px;
        width: 350px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        background: #2e7d32;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #1b5e20;
      }

      .error {
        color: #b00020;
        margin-top: 10px;
        text-align: center;
        font-size: 14px;
      }

      .field-error {
        color: #b00020;
        margin-top: 6px;
        font-size: 13px;
      }

      .footer {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h2>Connexion</h2>

        <form method="post">
          {% csrf_token %}

          <label>Nom d’utilisateur</label>
          <input type="text" name="username" required />

          <label>Mot de passe</label>
          <input type="password" name="password" required />

          <button type="submit" class="btn">Se connecter</button>
        </form>

        <p class="auth-footer">
          Pas encore de compte ?
          <a href="{% url 'register' %}">Créer un compte</a>
        </p>
      </div>
    </div>
  </body>
</html>
